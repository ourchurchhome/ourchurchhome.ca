version: 1
contentModels:
    - name: churches
      path: src/content/churches/*.md
      format: markdown
      frontmatter_format: yaml
      fields:
        - entry_title: true
          name: title
          required: true
          type: string
        - name: address
          required: true
          type: string
        - name: serviceTime
          required: true
          type: string
        - name: description
          type: string
        - display:
            component: media
            config:
                collection: public-images
          name: image
          type: string
      operations:
        create: false
        read: true
        update: true
        destroy: false
      previewUrl: /churches/{{.Filename}}
    - name: articles
      path: src/content/articles/*.md
      format: markdown
      frontmatter_format: yaml
      fields:
        - entry_title: true
          name: title
          required: true
          type: string
        - display:
            description: ISO date (YYYY-MM-DD)
            component: date
          name: date
          required: true
          type: string
        - display:
            component: select
          enum:
            - announcement
            - news
            - reflection
            - general
          name: category
          required: true
          type: string
        - default: all
          display:
            component: select
          enum:
            - morell
            - mount-stewart
            - st-peters-bay
            - all
          name: church
          required: true
          type: string
        - name: description
          type: string
        - default: false
          name: draft
          type: boolean
      previewUrl: /articles/{{.Filename}}
    - name: banner
      path: src/content/banner.md
      format: markdown
      frontmatter_format: yaml
      fields:
        - default: false
          name: enabled
          type: boolean
        - name: link
          type: string
      operations:
        create: false
        destroy: false
      previewUrl: /
    - name: schedules
      path: src/content/schedules/*.json
      format: json
      fields:
        - name: title
          entry_title: true
          required: true
          type: string
          display:
            hidden: true
        - name: church
          required: true
          type: string
          enum:
            - morell
            - mount-stewart
            - st-peters-bay
        - display:
            component: select
          name: type
          required: true
          type: string
          enum:
            - cleaner
            - greeter
            - reader
        - display:
            component: table
          fields:
            - display:
                description: ISO date (YYYY-MM-DD)
                component: date
              name: date
              required: true
              type: string
            - name: name
              required: true
              type: string
          name: entries
          type: array
      operations:
        create: false
        read: true
        update: true
        destroy: false
      previewUrl: /churches/{{.Church}}
    - name: homepage
      path: src/content/homepage.json
      format: json
      fields:
        - fields:
            churches:
                - name: title
                  required: true
                  type: string
                - name: subtitle
                  type: string
            hero:
                - name: title
                  required: true
                  type: string
                - name: subtitle
                  type: string
                - display:
                    component: media
                    config:
                        collection: public-images
                  name: image
                  type: string
                - fields:
                    - default: false
                      name: primary
                      type: boolean
                    - name: copy
                      required: true
                      type: string
                    - name: url
                      required: true
                      type: string
                  name: buttons
                  type: array
            news:
                - name: title
                  required: true
                  type: string
                - name: subtitle
                  type: string
            vision:
                - name: title
                  required: true
                  type: string
                - name: body
                  type: string
                - name: quote
                  type: string
                - name: communityCount
                  type: integer
                - name: yearsOfGrace
                  type: string
                - name: ctaTitle
                  type: string
                - name: ctaDescription
                  type: string
          homogenous: false
          name: widgets
          type: array
      operations:
        create: false
        destroy: false
      previewUrl: /
mediaCollections:
    - name: public-images
      path: public/images/**/*
      embedPathTemplate: /images/{{.Filename}}.{{.Ext}}
      allowedMimes:
        - image/jpeg
        - image/png
        - image/webp
        - image/avif
        - image/gif
