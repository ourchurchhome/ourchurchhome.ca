# yaml-language-server: $schema=https://api-dev.gogitcms.com/schemas/go-git-cms.json
# GoGitCMS schema configuration
# See: https://docs.gogitcms.com/schema

version: 1
contentModels:
  # ── Churches ───────────────────────────────────────────────────────────────
  - name: churches
    path: "src/content/churches/*.md"
    format: markdown
    frontmatter_format: yaml
    previewUrl: https://ourchurchhome-ca-sage.vercel.app/preview/churches/{{slug}}
    operations:
      create: false
      read: true
      update: true
      destroy: false
    fields:
      - name: title
        type: string
        required: true
        entry_title: true
      - name: address
        type: string
        required: true
      - name: serviceTime
        type: string
        required: true
      - name: description
        type: string
      - name: image
        type: string
        display:
          component: media
          config:
              collection: public-images

  # ── Articles ───────────────────────────────────────────────────────────────
  - name: articles
    path: "src/content/articles/*.md"
    previewUrl: https://ourchurchhome-ca-sage.vercel.app/preview/articles/{{filename}}
    format: markdown
    frontmatter_format: yaml
    fields:
      - name: title
        type: string
        required: true
        entry_title: true
      - name: date
        type: string
        required: true
        display:
          description: "ISO date (YYYY-MM-DD)"
          component: date
      - name: category
        type: string
        required: true
        enum:
          - announcement
          - news
          - reflection
          - general
        display:
          component: select
      - name: church
        type: string
        required: true
        default: all
        enum:
          - morell
          - mount-stewart
          - st-peters-bay
          - all
        display:
          component: select
      - name: description
        type: string
      - name: draft
        type: boolean
        default: false

  # ── Banner (singleton) ─────────────────────────────────────────────────────
  - name: banner
    path: "src/content/banner.md"
    format: markdown
    frontmatter_format: yaml
    operations:
      create: false
      destroy: false
    fields:
      - name: enabled
        type: boolean
        default: false
      - name: link
        type: string

  # ── Schedules ──────────────────────────────────────────────────────────────
  - name: schedules
    path: "src/content/schedules/*.json"
    format: json
    operations:
      create: false
      read: true
      update: true
      destroy: false
    fields:
      - name: church
        type: string
        required: true
        entry_title: true
        enum:
          - morell
          - mount-stewart
          - st-peters-bay
      - name: type
        type: string
        required: true
        enum:
          - greeter
          - reader
          - cleaner
      - name: entries
        type: array
        fields:
          - name: date
            type: string
            required: true
            display:
              description: "ISO date (YYYY-MM-DD)"
              component: date
          - name: name
            type: string
            required: true

  # ── Homepage (singleton) ───────────────────────────────────────────────────
  - name: homepage
    path: "src/content/homepage.json"
    previewUrl: https://ourchurchhome-ca-sage.vercel.app/preview/
    format: json
    operations:
      create: false
      destroy: false
    fields:
      - name: widgets
        type: array
        homogenous: false
        fields:
          hero:
            - name: title
              type: string
              required: true
            - name: subtitle
              type: string
            - name: image
              type: string
              display:
                component: media
                config:
                  collection: public-images
            - name: buttons
              type: array
              fields:
                - name: primary
                  type: boolean
                  default: false
                - name: copy
                  type: string
                  required: true
                - name: url
                  type: string
                  required: true
          news:
            - name: title
              type: string
              required: true
            - name: subtitle
              type: string
          vision:
            - name: title
              type: string
              required: true
            - name: body
              type: string
            - name: quote
              type: string
            - name: communityCount
              type: integer
            - name: yearsOfGrace
              type: string
            - name: ctaTitle
              type: string
            - name: ctaDescription
              type: string
          churches:
            - name: title
              type: string
              required: true
            - name: subtitle
              type: string

mediaCollections:
  - name: public-images
    path: public/images/**/*
    embedPathTemplate: /images/{{.FileName}}.{{.Ext}}
    allowedMimes:
      - image/jpeg
      - image/png
      - image/webp
      - image/avif
      - image/gif